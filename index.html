<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Livret d'accueil · L'Intendant Toulouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white:  #ffffff;
    --bg:     #f7f5f2;
    --black:  #0a0a0a;
    --sand:   #EDE5DE;
    --red:    #941101;
    --muted:  #8a8a8a;
    --border: #e0dbd5;
  }
  body {
    min-height: 100svh;
    background: var(--white);
    color: var(--black);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 2.5rem;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
    z-index: 100;
  }
  .wrap {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: rise .8s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise {
    from { opacity:0; transform:translateY(22px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .logo-block { margin-bottom: 2.5rem; text-align: center; }
  .logo-full  { width: 220px; object-fit: contain; }
  .divider    { width: 36px; height: 2px; background: var(--red); margin: 0 auto 2.2rem; }
  .title-block { text-align: center; margin-bottom: 2.5rem; }
  .title-block h1 {
    font-family: 'GFS Didot', serif;
    font-size: 1.5rem; font-weight: 400;
    letter-spacing: .02em; color: var(--black);
  }
  .title-block p {
    margin-top: .5rem; font-size: .62rem; font-weight: 300;
    letter-spacing: .22em; text-transform: uppercase; color: var(--muted);
  }
 
  /* ── BUTTONS ── */
  .btns { width: 100%; display: flex; flex-direction: column; gap: .55rem; }
  .btn {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--black);
    text-decoration: none;
    position: relative; overflow: hidden;
    transition: border-color .2s, background .2s, transform .18s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 0;
    background: var(--red); transition: width .22s ease;
  }
  .btn:hover { border-color: #c0b8b0; background: var(--bg); transform: translateX(3px); }
  .btn:hover::before { width: 3px; }
  .btn:active { transform: translateX(1px); background: var(--sand); }
  .btn-access { border-color: rgba(148,17,1,.22); }
  .btn-access:hover { border-color: rgba(148,17,1,.55); }
  .btn-flag { font-size: 1.55rem; line-height: 1; flex-shrink: 0; position: relative; z-index: 1; }
  .btn-flag-icon { width: 30px; height: 30px; flex-shrink: 0; position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }
  .btn-body { flex: 1; position: relative; z-index: 1; }
  .btn-lang { display: block; font-size: .76rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--black); }
  .btn-sub  { display: block; font-size: .6rem; font-weight: 300; letter-spacing: .1em; color: var(--muted); margin-top: .1rem; }
  .btn-arrow { font-size: .85rem; color: var(--muted); flex-shrink: 0; position: relative; z-index: 1; transition: color .18s, transform .18s; }
  .btn:hover .btn-arrow { color: var(--red); transform: translateX(4px); }
  .btn:nth-child(1) { animation: rise .55s .12s both; }
  .btn:nth-child(2) { animation: rise .55s .19s both; }
  .btn:nth-child(3) { animation: rise .55s .26s both; }
  .btn:nth-child(4) { animation: rise .55s .33s both; }
 
  /* ── VIEWER MODAL ── */
  .viewer-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: rgba(10,10,10,.92);
    flex-direction: column;
    animation: fadeIn .25s ease both;
  }
  .viewer-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
 
  .viewer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .75rem 1.25rem;
    background: var(--white);
    border-bottom: 2px solid var(--red);
    flex-shrink: 0;
  }
  .viewer-title {
    font-family: 'GFS Didot', serif;
    font-size: .95rem; color: var(--black);
    letter-spacing: .02em;
  }
  .viewer-close {
    background: none; border: none; cursor: pointer;
    font-size: 1.4rem; color: var(--black);
    line-height: 1; padding: .2rem .4rem;
    transition: color .15s;
  }
  .viewer-close:hover { color: var(--red); }
 
  .viewer-frame {
    flex: 1;
    width: 100%; border: none;
    background: #f0ece8;
  }
 
  /* ── FOOTER ── */
  .footer { margin-top: 2.8rem; text-align: center; animation: rise .55s .45s both; }
  .footer-rule { width: 1px; height: 32px; background: var(--border); margin: 0 auto 1.2rem; }
  .footer-name { font-size: .57rem; font-weight: 400; letter-spacing: .32em; text-transform: uppercase; color: #bbb; }
  .footer-link { display: block; margin-top: .4rem; font-size: .6rem; font-weight: 300; letter-spacing: .1em; color: #bbb; text-decoration: none; }
  .footer-link:hover { color: var(--red); }
 
  @media (max-width: 360px) {
    body { padding: 2rem 1rem; }
    .logo-full { width: 180px; }
    .btn { padding: .85rem 1rem; }
  }
</style>
</head>

  <iframe class="viewer-frame" id="viewer-frame" src="" title="Livret d'accueil" allowfullscreen></iframe>
</div>
